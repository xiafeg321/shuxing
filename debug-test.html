<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调试测试 - 数星</title>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            padding: 20px;
            background: #f5f7ff;
        }
        
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        button {
            background: #8c98ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        pre {
            background: #f0f2ff;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>数星 - 调试测试页面</h1>
    
    <div class="test-section">
        <h2>1. 测试JavaScript加载</h2>
        <button onclick="testJS()">测试JS文件加载</button>
        <div id="js-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试星座选择功能</h2>
        <div id="zodiac-test-area" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0;">
            <!-- 星座选项将动态生成 -->
        </div>
        <div id="zodiac-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试本地存储</h2>
        <button onclick="testStorage()">测试本地存储</button>
        <button onclick="clearStorage()">清空存储</button>
        <div id="storage-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 直接访问页面</h2>
        <p><a href="setup.html" target="_blank">打开人格设置页面</a></p>
        <p><a href="test.html" target="_blank">打开功能测试页面</a></p>
    </div>
    
    <script>
        // 测试setup.js中的星座数据
        function testJS() {
            const resultDiv = document.getElementById('js-test-result');
            
            try {
                // 尝试访问setup.js中的变量
                if (typeof personalityData !== 'undefined') {
                    const zodiacCount = Object.keys(personalityData.zodiac).length;
                    const mbtiCount = Object.keys(personalityData.mbti).length;
                    
                    resultDiv.innerHTML = `
                        <pre>✅ setup.js加载成功！
星座数量: ${zodiacCount}
MBTI数量: ${mbtiCount}

示例星座数据:
白羊座: ${JSON.stringify(personalityData.zodiac['白羊'], null, 2)}

示例MBTI数据:
ENFP: ${JSON.stringify(personalityData.mbti['ENFP'], null, 2)}
                        </pre>
                    `;
                    
                    // 生成星座选项用于测试
                    generateZodiacOptions();
                } else {
                    resultDiv.innerHTML = '<pre style="color: red;">❌ personalityData未定义 - setup.js可能未正确加载</pre>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<pre style="color: red;">❌ 测试失败: ${error.message}</pre>`;
            }
        }
        
        function generateZodiacOptions() {
            const area = document.getElementById('zodiac-test-area');
            area.innerHTML = '';
            
            Object.entries(personalityData.zodiac).forEach(([key, data]) => {
                const div = document.createElement('div');
                div.style.cssText = `
                    padding: 10px;
                    background: #f0f2ff;
                    border-radius: 5px;
                    text-align: center;
                    cursor: pointer;
                    border: 2px solid transparent;
                `;
                div.innerHTML = `
                    <div style="font-size: 24px;">${data.symbol}</div>
                    <div><strong>${data.name}</strong></div>
                    <div style="font-size: 12px; color: #666;">${data.element}象</div>
                `;
                
                div.onclick = function() {
                    document.getElementById('zodiac-test-result').innerHTML = `
                        <pre>✅ 选择了: ${data.name} (${key})
特征: ${data.trait}
元素: ${data.element}
                        </pre>
                    `;
                    
                    // 高亮选择
                    document.querySelectorAll('#zodiac-test-area > div').forEach(el => {
                        el.style.borderColor = 'transparent';
                    });
                    this.style.borderColor = '#8c98ff';
                };
                
                area.appendChild(div);
            });
        }
        
        function testStorage() {
            const resultDiv = document.getElementById('storage-test-result');
            
            try {
                // 测试写入
                localStorage.setItem('debug_test', '测试值_' + Date.now());
                
                // 测试读取
                const value = localStorage.getItem('debug_test');
                
                // 检查数星相关存储
                const allKeys = Object.keys(localStorage);
                const shuxingKeys = allKeys.filter(key => 
                    key.includes('数星') || key.includes('shuxing') || key.includes('debug')
                );
                
                resultDiv.innerHTML = `
                    <pre>✅ 本地存储测试通过
测试键值: debug_test = ${value}

相关存储键 (${shuxingKeys.length}个):
${shuxingKeys.map(key => `  ${key}: ${localStorage.getItem(key).substring(0, 80)}...`).join('\n')}
                    </pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<pre style="color: red;">❌ 存储测试失败: ${error.message}</pre>`;
            }
        }
        
        function clearStorage() {
            if (confirm('确定要清空调试相关的本地存储吗？')) {
                const keys = ['debug_test'];
                keys.forEach(key => localStorage.removeItem(key));
                document.getElementById('storage-test-result').innerHTML = '<pre>✅ 已清空调试存储</pre>';
            }
        }
        
        // 页面加载时自动测试
        window.addEventListener('load', function() {
            setTimeout(testJS, 500);
            setTimeout(testStorage, 1000);
        });
    </script>
</body>
</html>
