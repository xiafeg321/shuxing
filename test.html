<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数星 - 功能测试</title>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f5f7ff 0%, #e6e9ff 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #4a5568;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 4px solid #8c98ff;
        }
        
        .test-section h2 {
            color: #4a5568;
            margin-top: 0;
        }
        
        .test-result {
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .success {
            color: #48bb78;
            border-left: 4px solid #48bb78;
        }
        
        .error {
            color: #f56565;
            border-left: 4px solid #f56565;
        }
        
        .test-btn {
            background: linear-gradient(135deg, #8c98ff 0%, #6c7bff 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 123, 255, 0.3);
        }
        
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .link {
            display: inline-block;
            padding: 10px 20px;
            background: #f0f2ff;
            color: #8c98ff;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        
        .link:hover {
            background: #8c98ff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数星 - 功能测试页面</h1>
        
        <div class="test-section">
            <h2>1. 本地存储测试</h2>
            <button class="test-btn" onclick="testLocalStorage()">测试本地存储</button>
            <button class="test-btn" onclick="clearLocalStorage()">清空本地存储</button>
            <div id="localStorageResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 数据文件测试</h2>
            <button class="test-btn" onclick="testTraitsData()">测试人格特征数据</button>
            <div id="traitsDataResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 页面链接测试</h2>
            <div class="links">
                <a href="index.html" class="link" target="_blank">首页</a>
                <a href="setup.html" class="link" target="_blank">人格设置页面</a>
                <a href="chat.html" class="link" target="_blank">对话页面</a>
                <a href="http://localhost:3000/" class="link" target="_blank">本地服务器</a>
            </div>
        </div>
        
        <div class="test-section">
            <h2>4. 模拟用户设置</h2>
            <button class="test-btn" onclick="setTestUserSettings()">设置测试用户数据</button>
            <div id="userSettingsResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>5. 服务器状态</h2>
            <button class="test-btn" onclick="testServerStatus()">测试服务器状态</button>
            <div id="serverStatusResult" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h2>6. 快速开始</h2>
            <p>要快速开始使用数星：</p>
            <ol>
                <li>点击"设置测试用户数据"按钮</li>
                <li>点击"人格设置页面"链接</li>
                <li>完成设置后，点击"对话页面"开始聊天</li>
            </ol>
        </div>
    </div>
    
    <script>
        function testLocalStorage() {
            const resultDiv = document.getElementById('localStorageResult');
            try {
                // 测试写入
                localStorage.setItem('test_key', 'test_value_' + Date.now());
                
                // 测试读取
                const value = localStorage.getItem('test_key');
                
                // 获取所有数星相关的键
                const allKeys = Object.keys(localStorage);
                const shuxingKeys = allKeys.filter(key => key.includes('数星') || key.includes('shuxing'));
                
                resultDiv.innerHTML = `
✅ 本地存储测试通过！
测试键值: test_key = ${value}

数星相关存储键:
${shuxingKeys.map(key => `  • ${key}: ${localStorage.getItem(key).substring(0, 100)}...`).join('\n')}
                `;
                resultDiv.className = 'test-result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 本地存储测试失败: ${error.message}`;
                resultDiv.className = 'test-result error';
            }
        }
        
        function clearLocalStorage() {
            if (confirm('确定要清空所有数星相关的本地存储吗？')) {
                const allKeys = Object.keys(localStorage);
                const shuxingKeys = allKeys.filter(key => key.includes('数星') || key.includes('shuxing'));
                
                shuxingKeys.forEach(key => {
                    localStorage.removeItem(key);
                });
                
                document.getElementById('localStorageResult').innerHTML = `
✅ 已清空数星相关存储
清理了 ${shuxingKeys.length} 个键
                `;
                document.getElementById('localStorageResult').className = 'test-result success';
            }
        }
        
        async function testTraitsData() {
            const resultDiv = document.getElementById('traitsDataResult');
            try {
                const response = await fetch('data/traits.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
✅ 人格特征数据加载成功！
数据统计:
• 星座特征: ${Object.keys(data.zodiacTraits || {}).length} 个
• MBTI特征: ${Object.keys(data.mbtiTraits || {}).length} 个
• 回复模板: ${Object.keys(data.replyTemplates || {}).length} 类

示例数据:
• 白羊座: ${data.zodiacTraits?.白羊?.traits || 'N/A'}
• ENFP类型: ${data.mbtiTraits?.ENFP?.traits || 'N/A'}
                `;
                resultDiv.className = 'test-result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 人格特征数据加载失败: ${error.message}`;
                resultDiv.className = 'test-result error';
            }
        }
        
        function setTestUserSettings() {
            const testSettings = {
                zodiac: '双子',
                mbti: 'ENFP',
                chatHistory: '今天天气真好，我们出去走走吧~ 记得带伞哦，可能会下雨。'
            };
            
            try {
                localStorage.setItem('shuxing_user_settings', JSON.stringify(testSettings));
                
                // 验证保存
                const saved = JSON.parse(localStorage.getItem('shuxing_user_settings'));
                
                document.getElementById('userSettingsResult').innerHTML = `
✅ 测试用户设置已保存！
设置内容:
• 星座: ${saved.zodiac}
• MBTI: ${saved.mbti}
• 聊天记录: ${saved.chatHistory.substring(0, 50)}...

现在可以:
1. 刷新首页查看设置状态
2. 进入对话页面开始聊天
                `;
                document.getElementById('userSettingsResult').className = 'test-result success';
            } catch (error) {
                document.getElementById('userSettingsResult').innerHTML = `❌ 保存用户设置失败: ${error.message}`;
                document.getElementById('userSettingsResult').className = 'test-result error';
            }
        }
        
        async function testServerStatus() {
            const resultDiv = document.getElementById('serverStatusResult');
            try {
                const response = await fetch('http://localhost:3000/');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                const hasTitle = text.includes('<title>数星');
                
                resultDiv.innerHTML = `
✅ 服务器运行正常！
状态: HTTP ${response.status}
页面标题: ${hasTitle ? '包含"数星"' : '未找到标题'}

可访问页面:
• 首页: http://localhost:3000/
• 设置页: http://localhost:3000/setup.html
• 对话页: http://localhost:3000/chat.html
• 测试页: http://localhost:3000/test.html
                `;
                resultDiv.className = 'test-result success';
            } catch (error) {
                resultDiv.innerHTML = `❌ 服务器测试失败: ${error.message}

可能的原因:
1. 服务器未启动
2. 端口被占用
3. 防火墙阻止

解决方案:
在终端运行: cd 数星-网页原型 && python3 -m http.server 3000
                `;
                resultDiv.className = 'test-result error';
            }
        }
        
        // 页面加载时自动运行一些测试
        window.addEventListener('load', function() {
            testServerStatus();
            setTimeout(testTraitsData, 500);
            setTimeout(testLocalStorage, 1000);
        });
    </script>
</body>
</html>
