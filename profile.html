<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="个人中心 - 数星情感陪伴">
    <meta name="theme-color" content="#7c8aff">
    <title>个人中心 | 数星</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-page { padding: 24px 0; }
        .profile-header {
            display: flex; align-items: center; gap: 20px;
            padding: 28px 24px; background: var(--card);
            border-radius: var(--radius-md); margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .profile-avatar {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #ede9fe, #e0e7ff);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #7c3aed; flex-shrink: 0;
        }
        .profile-header-info { flex: 1; }
        .profile-header-info h2 { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .profile-header-info p { font-size: 0.85rem; color: var(--text-secondary); }

        .profile-section {
            background: var(--card); border-radius: var(--radius-md);
            padding: 22px 24px; margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .profile-section-title {
            font-size: 1rem; font-weight: 600; color: var(--text);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .profile-section-title i { color: var(--primary); }

        /* 进度条 */
        .progress-item { margin-bottom: 14px; }
        .progress-item:last-child { margin-bottom: 0; }
        .progress-header {
            display: flex; justify-content: space-between;
            font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 6px;
        }
        .progress-header span:first-child { font-weight: 500; color: var(--text); }
        .progress-track {
            height: 8px; background: var(--border); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 10px; transition: width 0.6s ease;
        }
        .progress-fill.l1 { background: linear-gradient(90deg, #a78bfa, #7c8aff); }
        .progress-fill.l2 { background: linear-gradient(90deg, #7c8aff, #6ba3d9); }
        .progress-fill.total { background: linear-gradient(90deg, #7c8aff, #a78bfa, #ff8a76); }

        /* 信息列表 */
        .profile-info-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .profile-info-item:last-child { border-bottom: none; }
        .info-icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 14px;
        }
        .info-icon { background: #ede9fe; color: #7c3aed; }
        .info-label { font-size: 0.85rem; color: var(--text-secondary); width: 70px; flex-shrink: 0; }
        .info-value { font-size: 0.9rem; color: var(--text); flex: 1; }

        .profile-empty {
            text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem;
        }

        /* 统计网格 */
        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        .stat-card {
            background: var(--card-hover); border-radius: var(--radius-sm);
            padding: 16px; text-align: center;
        }
        .stat-card .num {
            font-size: 1.8rem; font-weight: 700; color: var(--primary);
            line-height: 1.2;
        }
        .stat-card .label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

        /* 按钮区 */
        .action-buttons { display: flex; flex-direction: column; gap: 10px; }
        .action-btn {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px; background: var(--card-hover);
            border-radius: var(--radius-sm); border: none; cursor: pointer;
            text-align: left; font-size: 0.9rem; color: var(--text);
            transition: var(--transition); width: 100%;
        }
        .action-btn:hover { background: var(--border); transform: translateX(3px); }
        .action-btn i:first-child { width: 20px; color: var(--primary); font-size: 1rem; }
        .action-btn.danger { color: #e53e3e; }
        .action-btn.danger i:first-child { color: #e53e3e; }

        /* 阶段状态 */
        .stage-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 500;
        }
        .stage-badge.L1 { background: #ede9fe; color: #7c3aed; }
        .stage-badge.L2 { background: #dbeafe; color: #2563eb; }
        .stage-badge.L3 { background: #d1fae5; color: #059669; }
        .stage-badge.L4 { background: #fef3c7; color: #d97706; }

        /* 信息区域 */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-top: 4px;
        }
        .info-grid .data-item {
            background: var(--card-hover); border-radius: var(--radius-sm);
            padding: 12px 14px;
        }
        .data-item .label { font-size: 0.78rem; color: var(--text-muted); }
        .data-item .value { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-top: 2px; }

        @media (max-width: 768px) {
            .profile-header { padding: 20px 16px; }
            .profile-section { padding: 18px 16px; }
            .info-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Toast */
        .profile-toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--card); color: var(--text);
            padding: 10px 24px; border-radius: var(--radius-full);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            font-size: 0.9rem; z-index: 9999; opacity: 0; transition: all 0.3s;
        }
        .profile-toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .profile-toast.success { color: #059669; }
        .profile-toast.error { color: #e53e3e; }
    </style>
</head>
<body>
    <div class="stars-container" id="stars-container"></div>

    <div class="container" style="max-width: 600px;">
        <a href="index.html" class="back-btn" style="margin-bottom:12px;">
            <i class="fas fa-arrow-left"></i>
            返回首页
        </a>

        <div class="profile-page">
            <!-- 头部 -->
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-astronaut"></i>
                </div>
                <div class="profile-header-info">
                    <h2>我的数星</h2>
                    <p>管理你的人物模型和数据</p>
                </div>
            </div>

            <!-- 人物信息 -->
            <div class="profile-section">
                <div class="profile-section-title">
                    <i class="fas fa-user-circle"></i> 人物信息
                </div>
                <div class="profile-info-item">
                    <span class="info-icon" style="background:#ede9fe;color:#7c3aed;"><i class="fas fa-star-and-crescent"></i></span>
                    <span class="info-label">星座</span>
                    <span class="info-value" id="profile-zodiac">未设置</span>
                </div>
                <div class="profile-info-item">
                    <span class="info-icon" style="background:#dbeafe;color:#2563eb;"><i class="fas fa-brain"></i></span>
                    <span class="info-label">MBTI</span>
                    <span class="info-value" id="profile-mbti">未设置</span>
                </div>
                <div class="profile-info-item">
                    <span class="info-icon" style="background:#fce7f3;color:#db2777;"><i class="fas fa-user"></i></span>
                    <span class="info-label">对方称呼</span>
                    <span class="info-value" id="profile-nickname">未填写</span>
                </div>
                <div class="profile-info-item">
                    <span class="info-icon" style="background:#fef3c7;color:#d97706;"><i class="fas fa-handshake"></i></span>
                    <span class="info-label">认识方式</span>
                    <span class="info-value" id="profile-bg">未填写</span>
                </div>
            </div>

            <!-- 模型进度 -->
            <div class="profile-section">
                <div class="profile-section-title">
                    <i class="fas fa-chart-line"></i> 模型进度
                    <span class="stage-badge L1" id="profile-stage">初遇</span>
                </div>

                <div class="info-grid">
                    <div class="data-item">
                        <div class="label">对话轮数</div>
                        <div class="value" id="profile-rounds">0</div>
                    </div>
                    <div class="data-item">
                        <div class="label">记忆锚点</div>
                        <div class="value" id="profile-anchors">0</div>
                    </div>
                    <div class="data-item">
                        <div class="label">修正次数</div>
                        <div class="value" id="profile-corrections">0</div>
                    </div>
                    <div class="data-item">
                        <div class="label">相似度</div>
                        <div class="value" id="progress-similarity">初期</div>
                    </div>
                </div>

                <div style="margin-top: 18px;"></div>
                
                <div class="progress-item">
                    <div class="progress-header">
                        <span>基本信息</span>
                        <span id="progress-l1-text">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill l1" id="progress-l1" style="width:0%"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span>深度信息</span>
                        <span id="progress-l2-text">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill l2" id="progress-l2" style="width:0%"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-header">
                        <span>总进度</span>
                        <span id="progress-total-text">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill total" id="progress-total" style="width:0%"></div>
                    </div>
                </div>
            </div>

            <!-- 已收集信息 -->
            <div class="profile-section">
                <div class="profile-section-title">
                    <i class="fas fa-database"></i> 我知道的
                </div>
                <div id="profile-info-list">
                    <div class="profile-empty">还没有信息，先去聊天吧～</div>
                </div>
            </div>

            <!-- 统计数据 -->
            <div class="profile-section">
                <div class="profile-section-title">
                    <i class="fas fa-chart-bar"></i> 使用统计
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="num" id="profile-sessions">0</div>
                        <div class="label">对话次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="num" id="profile-messages">0</div>
                        <div class="label">消息总数</div>
                    </div>
                </div>
            </div>

            <!-- 操作 -->
            <div class="profile-section">
                <div class="profile-section-title">
                    <i class="fas fa-tools"></i> 数据管理
                </div>
                <div class="action-buttons">
                    <button class="action-btn" id="export-data-btn">
                        <i class="fas fa-download"></i>
                        <span>导出数据备份</span>
                    </button>
                    <button class="action-btn" id="import-data-btn">
                        <i class="fas fa-upload"></i>
                        <span>导入数据恢复</span>
                    </button>
                    <input type="file" id="import-data-input" accept=".json" style="display:none;">
                    <button class="action-btn" id="clear-history-btn">
                        <i class="fas fa-eraser"></i>
                        <span>清空对话历史</span>
                    </button>
                    <button class="action-btn danger" id="reset-model-btn">
                        <i class="fas fa-trash-alt"></i>
                        <span>重置人物模型</span>
                    </button>
                </div>
            </div>

            <div style="text-align:center;padding:16px;color:var(--text-muted);font-size:0.8rem;">
                © 2026 数星 · 数据仅保存在你的设备上
            </div>
        </div>
    </div>

    <script src="js/star-effects.js"></script>
    <script src="js/personality-data.js"></script>
    <script src="js/character-model.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
